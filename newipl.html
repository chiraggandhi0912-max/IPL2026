    <style>
        body { font-family: 'Inter', sans-serif; }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .sticky-col { position: sticky; left: 0; background-color: white; z-index: 20; border-right: 2px solid #e2e8f0; }
        .view-only input {
            background-color: transparent !important;
            border: 1px solid transparent !important;
            pointer-events: none;
            color: #1e293b;
            font-weight: 800;
        }
        .view-only .admin-only { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #1e293b;
            color: #fff;
            text-align: center;
            border-radius: 12px;
            padding: 16px;
            position: fixed;
            z-index: 300;
            left: 50%;
            transform: translateX(-50%);
            bottom: 30px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #toast.show { visibility: visible; animation: slideUpIn 0.4s; }
        @keyframes slideUpIn { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
    </style>
</head>

            }
        };

            if (!isAdmin) return;
            if (val === '') delete scores[`${pId}-${m}-${type}`];
            else scores[`${pId}-${m}-${type}`] = parseInt(val);
            
            saveData();
            renderSummary();
            renderApp();
        };

        window.resetData = () => {
            if(confirm("Confirm: Delete ALL local data?")) {
                scores = {};
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        };

        window.triggerCSVImport = () => {
            if (!isAdmin) {
                alert("Please login as ADMIN first!");
                return;
            }
            document.getElementById('csv-file-input').click();
        };

        window.handleCSVUpload = (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const text = e.target.result;
                    const rows = text.split(/\r\n|\n|\r/).map(row => row.split(','));
                    let importCount = 0;
                    let scoresUpdated = 0;

                    let runStartIndex = 4; 
                    let wktStartIndex = 24;
                    const headerRow = rows[0];
                    if (headerRow) {
                        let passedRun = false, passedWicket = false;
                        for (let i = 0; i < headerRow.length; i++) {
                            let cell = headerRow[i] ? headerRow[i].trim().toLowerCase() : "";
                            if (cell === "run") passedRun = true;
                            if (cell === "wicket") passedWicket = true;
                            if (passedRun && cell === "1" && runStartIndex === 4 && i < 15) runStartIndex = i;
                            if (passedWicket && cell === "1" && wktStartIndex === 24 && i > 15) wktStartIndex = i;
                        }
                    }

                    const simplifyName = (name) => name ? name.split('(')[0].replace(/[^a-zA-Z]/g, '').toLowerCase() : "";

                    rows.forEach(row => {
                        if (row.length > 20 && row[2] && !row[2].includes('Plyers')) {
                            let csvNameSimple = simplifyName(row[2]);
                            let pId = null;

                            for (let group of ownersData) {
                                for (let p of group.players) {
                                    let dbNameSimple = simplifyName(p.name);
                                    if (csvNameSimple === dbNameSimple) { pId = p.id; break; }
                                    // ... existing name matching logic ...
                                }
                                if (pId) break;
                            }

                            if (pId) {
                                importCount++;
                                matches.forEach((m, i) => {
                                    let rStr = row[runStartIndex + i];
                                    let wStr = row[wktStartIndex + i];
                                    if (rStr !== undefined) {
                                        let cleanR = rStr.trim();
                                        if (cleanR !== "" && cleanR !== "-") { 
                                            scores[`${pId}-${m}-runs`] = parseInt(cleanR); scoresUpdated++; 
                                        } else { delete scores[`${pId}-${m}-runs`]; }
                                    }
                                    if (wStr !== undefined) {
                                        let cleanW = wStr.trim();
                                        if (cleanW !== "" && cleanW !== "-") { 
                                            scores[`${pId}-${m}-wickets`] = parseInt(cleanW); scoresUpdated++; 
                                        } else { delete scores[`${pId}-${m}-wickets`]; }
                                    }
                                });
                            }
                        }
                    });

                    if (importCount > 0) {
                        saveData();
                        renderSummary();
                        renderApp();
                        alert(`✅ SUCCESS!\n\nMatched ${importCount} Players.\nUpdated ${scoresUpdated} stats!`);
                    } else { alert("❌ No matching players found!"); }

                } catch (error) { alert("⚠️ Failed to parse CSV."); }
                event.target.value = '';
            };
            reader.readAsText(file);
        };

        function calculateGroupScores(groupId) {
            let tr = 0, tw = 0;
            const group = ownersData.find(o => o.id === groupId);
            if (group) {
                group.players.forEach(p => {
                    if (p.cat === "Regular") {
                        matches.forEach(m => {
                            tr += (scores[`${p.id}-${m}-runs`] || 0);
                            tw += (scores[`${p.id}-${m}-wickets`] || 0);
                        });
                    }
                });
            }
            return { tr, tw };
        }

        function renderSummary() {
            const data = ownersData.map(o => {
                const res = calculateGroupScores(o.id);
                return { name: o.name.split(':')[1].trim(), r: res.tr, w: res.tw, id: o.id };
            });

            const maxRuns = Math.max(...data.map(d => d.r));
            const maxWickets = Math.max(...data.map(d => d.w));

            document.getElementById('summary-runs').innerHTML = data.map((d) => {
                const isHighest = d.r === maxRuns && d.r > 0;
                const bgClass = isHighest ? 'bg-gradient-to-br from-orange-50 to-orange-100 border-orange-400 shadow-[0_0_20px_rgba(249,115,22,0.4)] scale-110 z-10' : 'bg-white border-slate-100';
                return `<div class="p-3 pt-5 rounded-3xl border ${bgClass} flex flex-col items-center justify-center text-center h-full relative">
                    ${isHighest ? '<div class="absolute top-0 left-1/2 transform -translate-x-1/2 -mt-2.5 bg-orange-600 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-[0.2em] shadow-md z-20">TOP RUNS</div>' : ''}
                    <span class="text-slate-400 text-[9px] font-black uppercase leading-tight mb-1">${d.name}</span>
                    <span class="${isHighest ? 'text-orange-600 text-4xl' : 'text-orange-500 text-2xl'} font-black">${d.r}</span>
                </div>`;
            }).join('');

            document.getElementById('summary-wickets').innerHTML = data.map((d) => {
                const isHighest = d.w === maxWickets && d.w > 0;
                const bgClass = isHighest ? 'bg-gradient-to-br from-blue-50 to-blue-100 border-blue-400 shadow-[0_0_20px_rgba(59,130,246,0.4)] scale-110 z-10' : 'bg-white border-slate-100';
                return `<div class="p-3 pt-5 rounded-3xl border ${bgClass} flex flex-col items-center justify-center text-center h-full relative">
                    ${isHighest ? '<div class="absolute top-0 left-1/2 transform -translate-x-1/2 -mt-2.5 bg-blue-600 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-[0.2em] shadow-md z-20">TOP WICKETS</div>' : ''}
                    <span class="text-slate-400 text-[9px] font-black uppercase leading-tight mb-1">${d.name}</span>
                    <span class="${isHighest ? 'text-blue-600 text-4xl' : 'text-blue-500 text-2xl'} font-black">${d.w}</span>
                </div>`;
            }).join('');
        }

        function renderApp() {
            const activeId = document.activeElement ? document.activeElement.id : null;
            const cont = document.getElementById('groups-container');
            if(!cont) return;
            cont.innerHTML = ownersData.map(o => {
                const res = calculateGroupScores(o.id);
                return `
                <div class="bg-white rounded-[3rem] shadow-xl border border-slate-200 overflow-hidden mb-20">
                    <div class="bg-gradient-to-r from-slate-50 to-white px-10 py-10 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div class="flex flex-col"><span class="text-[11px] font-black text-indigo-500 uppercase tracking-widest mb-1 leading-none">Group Line: ${o.id}</span><span class="font-black text-slate-800 text-2xl uppercase tracking-tighter">${o.name}</span></div>
                        <div class="flex items-center gap-6">
                            <div class="bg-orange-50 px-8 py-4 rounded-[1.5rem] text-center min-w-[130px] border border-orange-100"><span class="block text-[10px] font-black text-orange-400 uppercase tracking-widest mb-1">RUNS</span><span class="text-4xl font-black text-orange-600">${res.tr}</span></div>
                            <div class="bg-blue-50 px-8 py-4 rounded-[1.5rem] text-center min-w-[130px] border border-blue-100"><span class="block text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">WICKETS</span><span class="text-4xl font-black text-blue-600">${res.tw}</span></div>
                        </div>
                    </div>
                    <div class="overflow-x-auto"><table class="w-full text-left min-w-[1900px]"><thead><tr class="bg-slate-50/50 font-black italic">
                        <th class="px-10 py-6 text-[12px] uppercase sticky left-0 bg-white z-20 w-64 shadow-[5px_0_15px_-5px_rgba(0,0,0,0.03)] text-slate-400">Player Profile</th>
                        <th class="px-4 py-6 text-[12px] uppercase text-center w-32 text-slate-400">Role</th>
                        <th class="px-2 py-6 text-[12px] uppercase text-center w-20 text-slate-400">Team</th>
                        ${matches.map(m => `<th class="px-1 py-6 text-[11px] text-center border-l border-slate-100 italic text-slate-300">M-${m}</th>`).join('')}
                        <th class="px-10 py-6 text-[12px] font-black text-indigo-700 text-center bg-indigo-50/50 sticky right-0 z-20 uppercase">TOTAL</th>
                    </tr></thead><tbody>${o.players.map(p => {
                        let pr=0, pw=0; matches.forEach(m => { pr += (scores[`${p.id}-${m}-runs`]||0); pw += (scores[`${p.id}-${m}-wickets`]||0); });
                        const isExtra = p.cat !== "Regular";
                        return `<tr class="hover:bg-slate-50 transition-all border-b border-slate-50 ${isExtra ? 'bg-slate-100/50' : ''}">
                        <td class="px-10 py-8 text-base font-black text-slate-700 sticky left-0 bg-white z-20 shadow-[5px_0_15px_-5px_rgba(0,0,0,0.02)]">${p.name}</td>
                        <td class="px-4 py-8 text-center text-[10px] font-black uppercase ${isExtra ? 'text-red-400' : 'text-slate-400'}">${p.cat}</td>
                        <td class="px-2 py-8 text-[12px] font-black text-indigo-500 text-center uppercase">${p.team}</td>
                        ${matches.map(m => `<td><div class="flex flex-col gap-2 p-1">
                        <input id="input-${p.id}-${m}-runs" type="number" class="w-full h-10 text-center text-sm font-black border-2 border-orange-50 rounded-xl focus:border-orange-500 bg-orange-50/30" placeholder="R" value="${scores[`${p.id}-${m}-runs`] !== undefined ? scores[`${p.id}-${m}-runs`] : ''}" onchange="handleScoreChange(${p.id},'${m}',this.value,'runs')"/>
                        <input id="input-${p.id}-${m}-wickets" type="number" class="w-full h-10 text-center text-sm font-black border-2 border-blue-50 rounded-xl focus:border-blue-500 bg-blue-50/30" placeholder="W" value="${scores[`${p.id}-${m}-wickets`] !== undefined ? scores[`${p.id}-${m}-wickets`] : ''}" onchange="handleScoreChange(${p.id},'${m}',this.value,'wickets')"/>
                        </div></td>`).join('')}
                        <td class="px-10 py-8 text-center sticky right-0 z-20 bg-slate-50/95 backdrop-blur-md">
                        ${isExtra ? 
                            `<div class="flex flex-col items-center justify-center h-full opacity-60"><span class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center leading-tight">EXCLUDED</span></div>` : 
                            `<div class="flex flex-col gap-1"><span class="text-xl font-black text-orange-600">${pr}</span><div class="h-[3px] bg-slate-200 w-8 mx-auto rounded-full my-1"></div><span class="text-xl font-black text-blue-600">${pw}</span></div>`
                        }
                        </td></tr>`;
                    }).join('')}</tbody></table></div></div>`;
            }).join('');
            renderSummary();
            if (activeId) { const el = document.getElementById(activeId); if (el) el.focus(); }
        }

        window.onload = bootSystem;
    </script>
</body>
</html>
